name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3'

      - name: Cache rebar3 deps and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-otp28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp28-

      - name: Compile
        run: rebar3 compile

      - name: Xref and Dialyzer
        run: rebar3 do xref, dialyzer

      - name: Common Test
        run: rebar3 ct
